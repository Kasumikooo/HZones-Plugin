  PvP_Command_NotYellowZone: "&cYou can only toggle your PvP status manually while inside a Yellow Zone!"
  PvP_Enable: "&aYour PvP is now enabled!"
  PvP_Disable: "&eYour PvP status is now disabled!"

  Fight_SafeZone: "&cYou can't fight in a safe zone!"
