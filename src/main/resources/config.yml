  # Set the global message is enabled or not
  enabled: true
  message: "&c[Server] &f¡The player &b%player_name% &fhas disconnect in combat!"

## Zone Messages

  Zone_Welcome_Message:
    # Set the welcome message is enabled or not
    enabled: true
    Message: "&aWelcome to the %zone_name% %zone_type% &azone!"

  # Zone Death Messages:

  Green_Zone_Death:
    enabled: true
    message: "&a[Zone] You died in a green zone. your loot is safe."

  Yellow_Zone_Death:
    enabled: true
    message: "&e[Zone] You died in Yellow zone. your loot is safe."

  Red_Zone_Death:
    enabled: true
    message: "&c[Zone] You died in a Red zone. You lost your loot."

  Black_Zone_Death:
    enabled: true
    # "%s" is player name, put this variable if you want to mention the player death name.
    message: "&8[&4Black Zone&8] &cThe player &e%s &chas been killed." # (This is a global Message.)

